<VirtualHost *:80>
        ServerAdmin keoinn@gmail.com
        ServerName demo.local.test

        DocumentRoot /var/www/StaticHTML

        <Directory "/var/www/StaticHTML">
                Options Indexes FollowSymLinks
                Require all granted
                DirectoryIndex index.html
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/error-StaticHTML.log
        CustomLog ${APACHE_LOG_DIR}/access-StaticHTML.log combined
</VirtualHost>
